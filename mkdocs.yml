site_name: Unreal Robotics Lab
site_description: MuJoCo physics simulation plugin for Unreal Engine — guides, API reference, and technical documentation.
site_url: https://urlab-sim.github.io/UnrealRoboticsLab/
repo_url: https://github.com/URLab-Sim/UnrealRoboticsLab
repo_name: URLab-Sim/UnrealRoboticsLab

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - scheme: slate
      primary: black
      accent: blue grey
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: white
      accent: blue grey
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  logo: images/logo.png
  favicon: images/logo.png
  font:
    text: Outfit
    code: Fira Code
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.indexes
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.select
    - toc.follow

plugins:
  - search:
      lang: en
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
  - pymdownx.inlinehilite
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Guides:
    - Getting Started: getting_started.md
    - Features: features.md
    - Architecture: architecture.md
    - MJCF Import: guides/mujoco_import.md
    - Geometry & Collision: guides/geometry_authoring.md
    - Controller Framework: guides/controller_framework.md
    - Debug Visualization: guides/debug_visualization.md
    - Camera Capture Modes: guides/camera_capture_modes.md
    - Possession & Twist Control: guides/possession_twist.md
    - Scripting with Blueprints: guides/blueprint_reference.md
    - ZMQ Networking & ROS 2: guides/zmq_networking.md
    - URLab Bridge: guides/policy_bridge.md
    - MJCF Schema Coverage: mjcf_schema_coverage.md
